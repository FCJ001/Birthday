<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#040308" />
    <title>加加生日快乐</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;600;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <canvas id="fx" aria-hidden="true"></canvas>

    <main class="app" aria-label="生日祝福">
      <!-- 顶部控件，极简的音乐按钮 -->
      <header class="top-controls">
        <button id="muteBtn" class="icon-btn" type="button" aria-label="静音">
          <span class="icon-text">音乐</span>
        </button>
      </header>

      <!-- 浪漫居中内容，直接漂浮在烟花背景上 -->
      <div class="romantic-content">
        <div class="title-wrap">
          <h1 class="title">
            <span class="title-sub">To 我的宝贝 加加</span>
            <span class="title-main">Happy Birthday</span>
          </h1>
        </div>

        <div class="lines" aria-live="polite" aria-atomic="true">
          <p class="line" data-line>今天这一天，把所有浪漫都送给你。</p>
          <p class="line" data-line>愿你的笑容比烟花更绚烂，</p>
          <p class="line" data-line>愿你的心事被星光轻轻拥抱。</p>
          <p class="line" data-line>加加，生日快乐！我爱你。</p>
        </div>
        
        <!-- 求婚/送花动画容器 -->
        <div class="proposal-wrap">
          <svg viewBox="0 0 200 150" class="proposal-svg">
            <defs>
              <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                <feGaussianBlur stdDeviation="1.5" result="blur" />
                <feComposite in="SourceGraphic" in2="blur" operator="over" />
              </filter>
            </defs>
            
            <!-- 男生 (左侧) -->
            <g class="boy" transform="translate(45, 105)">
              <!-- 头 -->
              <circle cx="0" cy="-38" r="7" fill="#a5d8ff" />
              <!-- 站立姿态 -->
              <g class="boy-stand">
                <path d="M-2,-31 L-2,5 L-5,25" stroke="#a5d8ff" stroke-width="2.5" fill="none" stroke-linecap="round" />
                <path d="M-2,5 L1,25" stroke="#a5d8ff" stroke-width="2.5" fill="none" stroke-linecap="round" />
                <path d="M-2,-25 L-5,-5" stroke="#a5d8ff" stroke-width="2.5" fill="none" stroke-linecap="round" />
                <path d="M-2,-25 L1,-5" stroke="#a5d8ff" stroke-width="2.5" fill="none" stroke-linecap="round" />
              </g>
              <!-- 跪地姿态 (初始隐藏) -->
              <g class="boy-kneel" style="opacity: 0;">
                <path d="M-2,-31 Q-8,-15 -8,5 L-8,25" stroke="#a5d8ff" stroke-width="2.5" fill="none" stroke-linecap="round" />
                <path d="M-8,25 L10,25" stroke="#a5d8ff" stroke-width="2.5" fill="none" stroke-linecap="round" />
                <path d="M-8,5 Q5,5 12,5 L12,25" stroke="#a5d8ff" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" />
                <!-- 手臂 (向前送花) 初始在身侧 -->
                <path class="boy-arm" d="M-4,-24 Q0,-20 5,-10" stroke="#a5d8ff" stroke-width="2.5" fill="none" stroke-linecap="round" />
                <!-- 玫瑰花：初始隐藏 -->
                <text class="rose-in-hand" x="5" y="-5" font-size="16" style="opacity: 0;">🌹</text>
              </g>
            </g>

            <!-- 女生 (右侧) -->
            <g class="girl" transform="translate(115, 105)" style="opacity: 0;">
               <!-- 头 -->
               <circle cx="0" cy="-40" r="7" fill="#ffadd2" />
               <!-- 身体：裙摆线条 -->
               <path d="M0,-33 Q-6,-15 -10,25" stroke="#ffadd2" stroke-width="2.5" fill="none" stroke-linecap="round" />
               <path d="M0,-33 Q6,-15 10,25" stroke="#ffadd2" stroke-width="2.5" fill="none" stroke-linecap="round" />
               <!-- 裙底连线 -->
               <path d="M-10,25 Q0,28 10,25" stroke="#ffadd2" stroke-width="2.5" fill="none" stroke-linecap="round" />
               <!-- 手臂 (捂嘴惊喜) -->
               <path d="M-4,-25 L-8,-18 L0,-30" stroke="#ffadd2" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" />
               <path d="M4,-25 L8,-18 L0,-30" stroke="#ffadd2" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" />
            </g>
          </svg>
        </div>
      </div>

      <!-- 开始引导遮罩层，点击后消失 -->
      <div id="startOverlay" class="start-overlay">
        <button id="startBtn" class="pulse-btn" type="button">
          点亮星空，开启浪漫
        </button>
        <div class="hint-text"></div>
      </div>
    </main>

    <audio id="bgm" preload="auto" loop playsinline webkit-playsinline>
      <source src="./assets/music.mp3" type="audio/mpeg" />
    </audio>

    <script src="./app.js" defer></script>
  </body>
</html>
